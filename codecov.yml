codecov:
  require_ci_to_pass: false

comment:
  layout: "reach,diff,flags,components"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

flags:
  unit-tests:
    paths:
      - src/main/java/
    carryforward: true

ignore:
  - "src/test/"
  - "src/main/resources/"
  - "target/"
  - "docs/"
